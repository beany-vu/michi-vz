<title>michi-vz: React + D3 chart library</title>

  /* ═══════════════════════════════════════════════════════════════════════
     ArgsTable redesign
     Targets stable class names only (.docblock-argstable*) since all inner
     emotion class names are hashed and change between builds.
     Column order: Name | Description | Default | Control (last-child).
     Compact mode drops Description + Default — first/last-child stay valid.
  ═══════════════════════════════════════════════════════════════════════ */

  /* Table shell: flat card, no drop-shadow */
  .docblock-argstable {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif !important;
    font-size: 13px !important;
    border-collapse: collapse !important;
    border: 1px solid var(--mv-line, #E5E5E5) !important;
    border-radius: 4px !important;
    overflow: hidden !important;
    width: 100% !important;
    table-layout: fixed !important;
    filter: none !important;
    margin: 16px 0 24px !important;
  }

  /* ── Header ─────────────────────────────────────────────────────────── */
  .docblock-argstable-head tr th {
    padding: 9px 14px !important;
    background: var(--mv-shell, #FAFAFA) !important;
    font-size: 10px !important;
    font-weight: 700 !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    color: var(--mv-ink-3, #9A9A9A) !important;
    border-bottom: 1px solid var(--mv-line, #E5E5E5) !important;
    white-space: nowrap !important;
  }
  /* Explicit column widths — table-layout:fixed uses these from the first row.
     Prop 28% | Default 18% | Control fills the remaining ~54% */
  .docblock-argstable-head tr th:first-child      { width: 28% !important; padding-left: 20px !important; }
  .docblock-argstable-head tr th:nth-last-child(2){ width: 18% !important; }
  .docblock-argstable-head tr th:last-child        { padding-right: 20px !important; }

  /* ── Body rows ───────────────────────────────────────────────────────── */

    border-bottom: 1px solid var(--mv-line-soft, #F0F0F0) !important;
  }
  .docblock-argstable-body tr:last-child {
    border-bottom: 0 !important;
  }

  /* All cells */

    padding: 11px 14px !important;
    vertical-align: top !important;
    font-size: 13px !important;
    color: var(--mv-ink, #0A0A0A) !important;
    background: #FFFFFF !important;
    line-height: 1.5 !important;

  /* Name cell: monospace name + description stacked below (merged via JS) */

    padding-left: 20px !important;
    width: 28% !important;
    font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace !important;

  /* Reset button */

</style>

<script>
(function () {
  "use strict";
  const TOP = "mv-code-top-bar";

  function buildTopBar(actionBar) {
    var preview = actionBar.parentElement;
    if (!preview) return;
    // Remove any stale clone
    var stale = preview.querySelector("." + TOP);
    if (stale) stale.remove();
    // Source div is the sibling immediately before the action bar
    var sourceDiv = actionBar.previousElementSibling;
    if (!sourceDiv || sourceDiv.classList.contains("docs-story")) return;

    var clone = actionBar.cloneNode(true);
    clone.classList.add(TOP);
    // Wire each cloned button to its original so React synthetic events fire
    var origBtns = Array.from(actionBar.querySelectorAll("button"));
    Array.from(clone.querySelectorAll("button")).forEach(function (btn, i) {
      btn.onclick = function (e) { e.stopPropagation(); if (origBtns[i]) origBtns[i].click(); };
    });
    preview.insertBefore(clone, sourceDiv);
  }

  var observer = new MutationObserver(function (mutations) {
    for (var i = 0; i < mutations.length; i++) {
      var m = mutations[i];
      if (m.type !== "attributes") continue;
      var btn = m.target;
      if (!btn.classList || !btn.classList.contains("docblock-code-toggle")) continue;
      // Walk up to the action bar
      var node = btn.parentElement;
      while (node && !(node.classList && node.classList.contains("sbdocs-preview-actions"))) {
        node = node.parentElement;
      }
      if (!node) continue;
      var actionBar = node;
      if (btn.classList.contains("docblock-code-toggle--expanded")) {
        // Wait one tick for React to render the source div
        (function (ab) { setTimeout(function () { buildTopBar(ab); }, 0); })(actionBar);
      } else {
        var parent = actionBar.parentElement;
        if (parent) { var old = parent.querySelector("." + TOP); if (old) old.remove(); }
      }
    }
  });

  observer.observe(document.documentElement, { subtree: true, attributes: true, attributeFilter: ["class"] });
})();
</script>

<script>
/* Merge Name + Description columns into one stacked cell. */
(function () {
  "use strict";

  function mergeTable(table) {
    if (table.dataset.mvMerged) return;
    table.dataset.mvMerged = "1";

    // Rename "Name" th → "Prop", hide "Description" th
    var ths = table.querySelectorAll(".docblock-argstable-head th");
    if (ths.length >= 2) {
      var label = ths[0].querySelector("span");
      if (label) label.textContent = "Prop";
      ths[1].style.display = "none";
    }

    // Each body row: lift description cell content into the name cell
    table.querySelectorAll(".docblock-argstable-body tr").forEach(function (row) {
      var tds = row.querySelectorAll("td");
      if (tds.length < 2) return;
      var nameCell = tds[0];
      var descCell = tds[1];

      // Skip section rows (colspan spans the whole row)
      if (nameCell.getAttribute("colspan") || descCell.getAttribute("colspan")) {
        descCell.style.display = "none";
        return;
      }
      if (nameCell.querySelector(".mv-argstable-desc")) return; // guard

      var wrap = document.createElement("div");
      wrap.className = "mv-argstable-desc";
      while (descCell.firstChild) wrap.appendChild(descCell.firstChild);
      nameCell.appendChild(wrap);
      descCell.style.display = "none";
    });
  }

  function scanAll() {
    document.querySelectorAll(".docblock-argstable").forEach(mergeTable);
  }

  // Run immediately in case the table is already in the DOM
  scanAll();

  // Re-scan whenever new nodes arrive (React renders docs pages asynchronously)
  new MutationObserver(scanAll).observe(document.documentElement, {
    childList: true,
    subtree: true,
  });
})();
</script>
