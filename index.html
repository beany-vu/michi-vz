<style>
  /* ─── Swiss ChartRail-style polish for the native Storybook sidebar ─── */
  /* michiVzTheme in manager.js already wires: bg (#FAFAFA), accent       */
  /* (#C84B3F), Helvetica Neue, and near-black text. These rules add the  */
  /* red left-border active indicator — the signature visual anchor of    */
  /* the ChartRail design — and flatten border-radius to match the Swiss  */
  /* modernist aesthetic.                                                  */

  /* Remove border-radius from the sidebar shell */
  [data-role="sidebar"],
  .sidebar-container {
    border-radius: 0 !important;
  }

  /* Active / selected item: red left-border accent */
  [data-selected="true"],
  [aria-current="page"] {
    border-left: 2px solid #c84b3f !important;
    box-sizing: border-box;
  }

  /* Hide the Storybook toolbar — MichiTopnav in the preview provides site nav */
  #storybook-toolbar,
  [class*="Toolbar"] {
    display: none !important;
  }

  /* Hide the drag-to-resize handle */
  [role="separator"],
  .sidebar-resizer,
  [class*="resizer"] {
    display: none !important;
  }
</style>
