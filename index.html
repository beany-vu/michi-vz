<style>
  /* Hide the native Storybook sidebar and toolbar */
  #storybook-explorer-menu,
  .sidebar-container,
  nav[aria-label="Storybook"],
  [data-role="sidebar"] {
    display: none !important;
  }

  /* Remove the left offset that Storybook adds when the sidebar is open.
     Storybook 10 sets inline left/margin-left on the main wrapper via JS.
     We override with max specificity. */
  #storybook-main,
  #storybook-preview-wrapper,
  [id="storybook-main"],
  [id="storybook-preview-wrapper"] {
    left: 0 !important;
    margin-left: 0 !important;
    width: 100% !important;
  }

  /* Hide the drag-to-resize handle between sidebar and main */
  [role="separator"],
  .sidebar-resizer,
  [class*="resizer"] {
    display: none !important;
  }

  /* Hide the toolbar / topbar area */
  #storybook-toolbar,
  [class*="Toolbar"] {
    display: none !important;
  }
</style>
